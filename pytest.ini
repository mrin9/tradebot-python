[pytest]
# Verbose output with custom headers via conftest.py
addopts = -s -v --tb=short
testpaths = tests
python_files = test_*.py
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

markers =
    live: marks tests as live integration tests (requires XTS credentials and active market)

filterwarnings =
    ignore::urllib3.exceptions.InsecureRequestWarning
